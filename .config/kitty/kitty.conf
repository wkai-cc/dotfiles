# 主题&配色
include GruvBox_DarkHard.conf
#include Wryan.conf
#include VSCode_Dark.conf
# 终端透明度
background_opacity 1
# 是否开启背景模糊
background_blur    1

# 字体
font_family        Maple Mono NF CN
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size           12
# 优化连字显示
disable_ligatures never

# 窗口布局
# 窗口内边距
window_padding_width 1
# 隐藏窗口标题栏
hide_window_decorations yes
# 启动时不恢复上次的窗口大小
# remember_window_size  no
# 初始窗口宽度和高度 (像素)
initial_window_width  1800
initial_window_height 1000
# 允许的窗口布局模式 (tall: 主从平铺, stack: 全屏缩放)
enabled_layouts tall,stack,fat

# 标签栏设置
# 使用 hidden 彻底不显示标签栏
tab_bar_style      hidden
# 或者设置为只有在打开 2 个以上标签页时才显示
tab_bar_min_tabs   2

# 光标自定义
# 光标形状：beam (竖线), underline (下划线), block (方块)
cursor_shape beam
# 竖线光标的粗细 (单位：pt)
cursor_beam_thickness 1.5
# 光标闪烁间隔 (0 表示不闪烁，单位：秒)
cursor_blink_interval 0
# 强制保持设置的光标形状，防止 Shell 脚本将其改回方块
shell_integration no-cursor

# 性能与交互
# 刷新延迟 (毫秒)，越小越流畅，但 CPU 占用略高
repaint_delay 8

# 输入延迟 (毫秒)，控制按键响应的即时感
input_delay 2

# 同步垂直刷新，防止画面撕裂
sync_to_monitor yes

# 鼠标选中文字时自动复制到剪贴板
copy_on_select yes

# 关闭警告音 (删除文件或按错键时的“嘟嘟”声)
enable_audio_bell no

# 允许外部程序（如 Neovim 插件）控制 Kitty
allow_remote_control yes
listen_on unix:/tmp/kitty

# 快捷键映射
# --- 窗口管理 ---
# Ctrl+Shift+Enter: 在当前标签页内开启新窗口 (平铺)
map ctrl+shift+enter new_window
# Ctrl+Shift+[: 切换到上一个窗口
map ctrl+shift+[     previous_window
# Ctrl+Shift+]: 切换到下一个窗口
map ctrl+shift+]     next_window

# --- 布局管理 ---
# Ctrl+Shift+L: 切换不同的布局模式
map ctrl+shift+l     next_layout

# --- 字体缩放 ---
# Ctrl+等号: 放大字体
map ctrl+equal       change_font_size all +1.0
# Ctrl+减号: 缩小字体
map ctrl+minus       change_font_size all -1.0
# Ctrl+数字0: 重置字体大小
map ctrl+0           change_font_size all 0

# --- 系统功能 ---
# Ctrl+Shift+F5: 立即重新加载配置文件 (无需重启 Kitty)
map ctrl+shift+f5    load_config_file
